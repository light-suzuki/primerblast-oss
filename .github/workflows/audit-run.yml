name: Post-integration audit

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  audit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - name: Repair CSV newline literal
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('primerblast_oss/outputs.py')
          text = path.read_text()
          broken = 'writer = csv.writer(buffer, lineterminator="\n")'
          fixed = 'writer = csv.writer(buffer, lineterminator="\\n")'
          if broken not in text:
              raise SystemExit('broken CSV newline literal not found')
          path.write_text(text.replace(broken, fixed, 1))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add primerblast_oss/outputs.py
          git commit -m "fix: preserve CSV newline literal"
          git push origin HEAD:${{ github.head_ref }}
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,thermo]"
      - name: Test full suite
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          pytest -q --tb=short > /tmp/pytest.log 2>&1
          status=$?
          cat /tmp/pytest.log
          if [ "$status" -ne 0 ]; then
            {
              echo '### Post-audit pytest failure'
              echo '```text'
              tail -180 /tmp/pytest.log
              echo '```'
            } > /tmp/pytest-comment.md
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/pytest-comment.md
          fi
          exit "$status"
      - name: Module self-tests
        run: |
          python primerblast_oss/caps.py
          python primerblast_oss/outputs.py
          python primerblast_oss/bed.py
          python primerblast_oss/vcf.py
