name: Continuous benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

jobs:
  synthetic-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ncbi-blast+ primer3
      - name: Install package with optional thermo support
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,thermo]"
      - name: Run continuous synthetic benchmark
        run: |
          python benchmarks/continuous_benchmark.py \
            --max-seconds 30 \
            --json-out continuous-benchmark.json
      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: continuous-benchmark
          path: continuous-benchmark.json
