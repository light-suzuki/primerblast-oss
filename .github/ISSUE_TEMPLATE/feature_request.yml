name: Feature request
description: Suggest an improvement or workflow
タイトル: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What are you trying to do, and where does the current project fall short?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the behavior, UI, command, or output you want.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add example data shape, platform constraints, or related tools if useful.