<style>
:root {
  --bg: #f3f6f4;
  --bg-2: #e9f0ec;
  --panel: #ffffff;
  --ink: #16241d;
  --muted: #64756c;
  --line: #e2e8e4;
  --line-strong: #cdd8d1;
  --accent: #2f6f4f;
  --accent-2: #3d8b64;
  --accent-soft: #e9f3ed;
  --accent-ink: #ffffff;
  --chip: #eef2f0;
  --code-bg: #0f1b17;
  --code-ink: #d9e8e0;
  --shadow: 0 1px 2px rgba(20,40,30,.04), 0 8px 24px rgba(20,40,30,.06);
  --shadow-sm: 0 1px 2px rgba(20,40,30,.05), 0 2px 8px rgba(20,40,30,.05);
  --a: #1f7a4d; --b: #2f7fb0; --c: #b8860b; --d: #b23a48;
  --low: #2f8f5b; --med: #c8891a; --high: #c0392b;
  --radius: 14px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #10161300; --bg-2: #131c18; --panel: #182019; --ink: #e7efe9; --muted: #9aaaa0;
    --line: #27332c; --line-strong: #33423a; --accent: #4aa87a; --accent-2: #5cc08f;
    --accent-soft: #1c2a22; --chip: #202b24; --code-bg: #0a120e; --code-ink: #d2e4d9;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 28px rgba(0,0,0,.35);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.25), 0 2px 10px rgba(0,0,0,.28);
  }
  body { background: #0f1512; }
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--bg); color: var(--ink);
  font: 14px/1.6 system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
  -webkit-font-smoothing: antialiased;
}
.app { max-width: 1140px; margin: 0 auto; padding: 0 16px 48px; }
a { color: var(--accent); }

/* ---------- top bar ---------- */
.topbar {
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
  padding: 16px 20px; margin: 16px 0 0;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
  border-radius: var(--radius); color: #fff; box-shadow: var(--shadow);
}
.brand { display: flex; gap: 14px; align-items: center; min-width: 0; }
.logo { display: inline-flex; align-items: center; line-height: 0; }
.logo svg { width: 34px; height: 34px; }
h1 { margin: 0; font-size: 21px; letter-spacing: .2px; font-weight: 800; color: #fff; }
.subtitle { margin: 3px 0 0; color: rgba(255,255,255,.86); font-size: 12.5px; font-weight: 500; }
.topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.status { font-size: 12px; padding: 5px 11px; border-radius: 999px; background: rgba(255,255,255,.18);
  color: #fff; font-weight: 600; backdrop-filter: blur(4px); white-space: nowrap; }
.status-bad { background: rgba(192,57,43,.85); }
.lang-btn { border: 1px solid rgba(255,255,255,.4); background: rgba(255,255,255,.14); color: #fff;
  border-radius: 9px; padding: 6px 13px; cursor: pointer; font-weight: 700; font-size: 13px; transition: background .15s; }
.lang-btn:hover { background: rgba(255,255,255,.28); }
.mode-switch { display: inline-flex; background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.35);
  border-radius: 9px; padding: 2px; gap: 2px; }
.ms-btn { border: none; background: transparent; color: rgba(255,255,255,.85); font: inherit; font-weight: 700;
  font-size: 12.5px; padding: 5px 11px; border-radius: 7px; cursor: pointer; white-space: nowrap; transition: background .15s, color .15s; }
.ms-btn:hover { color: #fff; }
.ms-btn.on { background: #fff; color: var(--accent); }

/* professional (dense) mode — drop the hand-holding, expose every knob */
:root[data-ui="pro"] .mode-intro,
:root[data-ui="pro"] .example-btn,
:root[data-ui="pro"] .legend,
:root[data-ui="pro"] .verdict-plain { display: none; }
:root[data-ui="pro"] .workspace { padding: 16px; }
:root[data-ui="pro"] fieldset { gap: 10px 14px; padding: 12px 14px 4px; margin-bottom: 12px; }
:root[data-ui="pro"] .pair-card { padding: 11px 13px; margin-bottom: 9px; }
:root[data-ui="pro"] details.adv > summary { color: var(--muted); }

/* ---------- database panel ---------- */
.db-panel { margin-top: 14px; background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow-sm); }
.db-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.db-head strong { font-size: 13.5px; }
.db-head .hint { color: var(--muted); font-size: 12px; }
.db-count { color: var(--muted); font-size: 12px; margin-left: auto; }
.db-count.warn { color: var(--high); font-weight: 700; }
.db-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.db-list:empty::before { content: attr(data-empty); color: var(--muted); font-size: 12.5px; }
.db-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 13px;
  border: 1.5px solid var(--line-strong); border-radius: 999px; cursor: pointer; user-select: none;
  background: var(--bg); font-size: 13px; font-weight: 600; transition: border-color .12s, background .12s, color .12s; }
.db-chip:hover { border-color: var(--accent); }
.db-chip .tick { font-weight: 800; color: var(--muted); }
.db-chip.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.db-chip.on .tick { color: var(--accent-ink); }
.db-custom { display: flex; gap: 8px; }
.db-custom input { flex: 1; }
.mini { border: 1px solid var(--line-strong); background: var(--bg); color: var(--ink);
  border-radius: 8px; padding: 6px 13px; cursor: pointer; font-size: 12.5px; font-weight: 600; transition: border-color .12s; }
.mini:hover { border-color: var(--accent); color: var(--accent); }
.req-tag { font-size: 10px; font-weight: 800; color: #fff; background: var(--high);
  border-radius: 999px; padding: 2px 9px; letter-spacing: .4px; }

/* ---------- tabs ---------- */
.tabs { display: flex; gap: 5px; margin: 18px 0 0; flex-wrap: wrap; }
.tab { border: 1px solid transparent; background: transparent; color: var(--muted);
  padding: 9px 15px; border-radius: 10px 10px 0 0; cursor: pointer; font-weight: 600; font-size: 13.5px;
  display: inline-flex; align-items: center; gap: 6px; transition: color .12s, background .12s; }
.tab:hover { color: var(--ink); background: var(--bg-2); }
.tab.active { color: var(--accent); background: var(--panel); border-color: var(--line);
  border-bottom-color: var(--panel); font-weight: 700; }
.tab.tab-guide.active { color: var(--accent); }

.workspace { background: var(--panel); border: 1px solid var(--line);
  border-radius: 0 var(--radius) var(--radius) var(--radius); padding: 20px; box-shadow: var(--shadow-sm); }
.panel { display: none; animation: fade .2s ease; }
.panel.active { display: block; }
@keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* ---------- mode intro ---------- */
.mode-intro { margin: 0 0 18px; padding: 14px 16px; border-left: 4px solid var(--accent);
  background: var(--accent-soft); border-radius: 0 10px 10px 0; }
.mode-intro h2 { margin: 0 0 4px; font-size: 16px; color: var(--accent); font-weight: 800; }
.mode-intro p { margin: 0; color: var(--ink); font-size: 13px; line-height: 1.65; }

/* ---------- forms ---------- */
fieldset { border: 1px solid var(--line); border-radius: 12px; margin: 0 0 16px; padding: 14px 16px 6px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px 16px; }
legend { font-weight: 800; font-size: 12.5px; color: var(--accent); padding: 0 8px; letter-spacing: .2px; }
label { display: flex; flex-direction: column; gap: 5px; font-size: 12.5px; color: var(--muted); position: relative; }
b.req { position: absolute; top: 0; right: 2px; color: var(--high); font-weight: 800; font-size: 14px; line-height: 1; }
label.full { grid-column: 1 / -1; }
label.check { flex-direction: row; align-items: center; gap: 8px; color: var(--ink); }
label > span { font-weight: 600; color: var(--ink); }
input, textarea, select { font: inherit; padding: 8px 10px; border: 1px solid var(--line-strong);
  border-radius: 9px; background: var(--bg); color: var(--ink); width: 100%; transition: border-color .12s, box-shadow .12s; }
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft); }
textarea { resize: vertical; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; font-size: 12.5px; }
.hint { color: var(--muted); font-style: normal; font-size: 11px; }
label.check input { width: auto; }

.actions { display: flex; gap: 10px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
.run { background: var(--accent); color: var(--accent-ink); border: none; border-radius: 10px;
  padding: 11px 26px; font-weight: 700; cursor: pointer; font-size: 14px; box-shadow: var(--shadow-sm); transition: background .15s, transform .05s; }
.run:hover { background: var(--accent-2); }
.run:active { transform: translateY(1px); }
.run:disabled { opacity: .6; cursor: progress; }
.ghost { background: transparent; border: 1px solid var(--line-strong); color: var(--muted);
  border-radius: 10px; padding: 11px 18px; cursor: pointer; font-weight: 600; transition: border-color .12s, color .12s; }
.ghost:hover { border-color: var(--accent); color: var(--accent); }
.example-btn { background: var(--accent-soft); border: 1px dashed var(--accent); color: var(--accent);
  border-radius: 10px; padding: 11px 16px; cursor: pointer; font-weight: 700; font-size: 12.5px; transition: background .12s; margin-right: auto; }
.example-btn:hover { background: var(--panel); }

details.adv { grid-column: 1/-1; }
details.adv > summary { cursor: pointer; font-weight: 700; color: var(--accent); font-size: 12.5px; padding: 6px 0; list-style: none; }
details.adv > summary::-webkit-details-marker { display: none; }
details.adv > summary::before { content: "▸ "; color: var(--accent); }
details.adv[open] > summary::before { content: "▾ "; }
details.adv .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 12px 16px; margin-top: 12px; }

/* ---------- results ---------- */
.results { margin-top: 20px; border-top: 1px solid var(--line); padding-top: 18px; }
.results-empty { color: var(--muted); text-align: center; padding: 28px; }
.spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid var(--line);
  border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; vertical-align: -3px; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.err { background: color-mix(in srgb, var(--high) 12%, transparent); border: 1px solid var(--high);
  color: var(--high); border-radius: 10px; padding: 13px 15px; white-space: pre-wrap;
  font-family: ui-monospace, monospace; font-size: 12px; }
.result-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
.result-head h3 { margin: 0; font-size: 15.5px; }
.result-head .meta { color: var(--muted); font-size: 12.5px; }

table { border-collapse: collapse; width: 100%; font-size: 12.5px; margin: 6px 0 14px; }
th, td { border-bottom: 1px solid var(--line); padding: 8px 10px; text-align: left; vertical-align: top; }
th { color: var(--muted); font-weight: 700; font-size: 11.5px; text-transform: uppercase; letter-spacing: .3px; }
tbody tr:hover { background: var(--bg-2); }
.seqmono { font-family: ui-monospace, monospace; }
.tbl-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 10px; }
.tbl-wrap table { margin: 0; }

.badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-weight: 800; font-size: 11px; color: #fff; }
.rank-A, .v-specific { background: var(--a); }
.rank-B, .v-gel { background: var(--b); }
.rank-C { background: var(--c); }
.rank-D, .v-ambiguous { background: var(--d); }
.risk-low { background: var(--low); } .risk-med { background: var(--med); } .risk-high { background: var(--high); }
.badge.small { font-size: 10px; padding: 1px 7px; }

.pair-card { border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; margin-bottom: 12px; box-shadow: var(--shadow-sm); }
.pair-card > summary { cursor: pointer; list-style: none; }
.pair-card > summary::-webkit-details-marker { display: none; }
.pair-summary { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.pair-summary .grow { flex: 1; min-width: 160px; }
.pair-summary .seqmono { font-size: 12px; }
.subline { color: var(--muted); font-size: 11.5px; margin-top: 2px; }

.legend { margin: 0 0 16px; background: var(--accent-soft); border: 1px solid var(--line); border-radius: 10px; padding: 2px 15px; }
.legend > summary { cursor: pointer; font-weight: 700; color: var(--accent); font-size: 12.5px; padding: 10px 0; }
.legend p { margin: 2px 0 10px; color: var(--ink); font-size: 12px; line-height: 1.65; }
.verdict-plain { margin: 8px 0 0; font-size: 12.5px; font-weight: 600; padding: 8px 12px; border-radius: 9px; }
.pv-ok { background: color-mix(in srgb, var(--a) 14%, transparent); color: var(--a); }
.pv-warn { background: color-mix(in srgb, var(--c) 18%, transparent); color: var(--c); }
.pv-bad { background: color-mix(in srgb, var(--high) 14%, transparent); color: var(--high); }
.meta [title], .badge[title] { cursor: help; }
pre.ascii, pre.explain { background: var(--code-bg); color: var(--code-ink); border-radius: 10px;
  padding: 13px 15px; overflow-x: auto; font-family: ui-monospace, monospace; font-size: 11.5px; line-height: 1.5; }
.downloads { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 6px 0 16px; }
.downloads strong { font-size: 12px; color: var(--muted); margin-right: 4px; }
.dlbtn { border: 1px solid var(--line-strong); background: var(--bg); color: var(--ink); border-radius: 8px;
  padding: 6px 13px; cursor: pointer; font-size: 12px; text-decoration: none; font-weight: 600; transition: border-color .12s, color .12s; }
.dlbtn:hover { border-color: var(--accent); color: var(--accent); }

/* ---------- GUIDE page ---------- */
.guide { max-width: 900px; }
.guide-hero { text-align: center; padding: 8px 0 22px; }
.guide-hero h2 { margin: 0 0 8px; font-size: 24px; font-weight: 800; letter-spacing: .2px; }
.guide-hero p { margin: 0 auto; max-width: 640px; color: var(--muted); font-size: 14px; line-height: 1.7; }
.guide h3 { font-size: 16.5px; margin: 30px 0 12px; padding-bottom: 8px; border-bottom: 2px solid var(--accent-soft);
  font-weight: 800; display: flex; align-items: center; }
.guide h3::before { content: ""; width: 3px; height: 16px; background: var(--accent); border-radius: 2px; margin-right: 10px; }

.steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.step { position: relative; background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 16px 16px 14px; }
.step .num { position: absolute; top: -12px; left: 14px; width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent); color: #fff; font-weight: 800; font-size: 13px; display: grid; place-items: center; box-shadow: var(--shadow-sm); }
.step h4 { margin: 8px 0 5px; font-size: 14px; font-weight: 800; }
.step p { margin: 0; font-size: 12.5px; color: var(--muted); line-height: 1.6; }

.mode-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
.mode-card { text-align: left; background: var(--bg); border: 1px solid var(--line); border-radius: 12px;
  padding: 16px; cursor: pointer; transition: border-color .14s, transform .06s, box-shadow .14s; font: inherit; color: inherit; }
.mode-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); transform: translateY(-2px); }
.mode-card .mc-top { display: flex; align-items: baseline; gap: 9px; margin-bottom: 7px; }
.mode-card .mc-cmd { font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; font-size: 11px;
  color: var(--accent); background: var(--accent-soft); border-radius: 5px; padding: 1px 7px; font-weight: 700; }
.mode-card .mc-name { font-weight: 800; font-size: 14.5px; }
.mode-card .mc-when { display: inline-block; font-size: 10.5px; font-weight: 700; color: var(--accent);
  background: var(--accent-soft); border-radius: 999px; padding: 2px 9px; margin-bottom: 8px; }
.mode-card p { margin: 0; font-size: 12.5px; color: var(--muted); line-height: 1.6; }
.mode-card .mc-go { margin-top: 9px; font-size: 12px; font-weight: 700; color: var(--accent); }

.info-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.info-box { background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 15px 17px; }
.info-box h4 { margin: 0 0 8px; font-size: 13.5px; font-weight: 800; }
.info-box ul { margin: 0; padding-left: 18px; }
.info-box li { font-size: 12.5px; color: var(--ink); margin-bottom: 6px; line-height: 1.55; }
.info-box li .k { font-weight: 700; }
.info-box code { background: var(--chip); border-radius: 5px; padding: 1px 6px; font-size: 11.5px;
  font-family: ui-monospace, monospace; color: var(--accent); }

.glossary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 24px; }
.gl { border-bottom: 1px solid var(--line); padding: 9px 2px; }
.gl dt { font-weight: 800; font-size: 13px; margin-bottom: 3px; }
.gl dd { margin: 0; font-size: 12px; color: var(--muted); line-height: 1.55; }

.faq details { border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; background: var(--bg); }
.faq summary { cursor: pointer; font-weight: 700; font-size: 13px; padding: 12px 15px; list-style: none; }
.faq summary::-webkit-details-marker { display: none; }
.faq summary::before { content: "＋ "; color: var(--accent); font-weight: 800; }
.faq details[open] summary::before { content: "− "; }
.faq details p { margin: 0; padding: 0 15px 14px; font-size: 12.5px; color: var(--muted); line-height: 1.65; }
.faq details p code { background: var(--chip); border-radius: 5px; padding: 1px 6px; font-family: ui-monospace, monospace; font-size: 11.5px; color: var(--accent); }

.guide-cta { text-align: center; margin: 28px 0 4px; }
.guide-cta button { background: var(--accent); color: #fff; border: none; border-radius: 10px;
  padding: 12px 30px; font-weight: 800; font-size: 14px; cursor: pointer; box-shadow: var(--shadow-sm); }
.guide-cta button:hover { background: var(--accent-2); }
.guide-foot { text-align: center; color: var(--muted); font-size: 12px; margin-top: 22px; }

@media (max-width: 720px) {
  .steps { grid-template-columns: 1fr; }
  .info-cols, .glossary { grid-template-columns: 1fr; }
  h1 { font-size: 18px; }
}
</style>

    "dl.order": "発注表",

  },
};

let LANG = localStorage.getItem("pb_lang") || "ja";

function t(key) {
  const table = I18N[LANG] || I18N.en;
  return (key in table) ? table[key] : (I18N.en[key] ?? key);
}

function setLang(lang) {
  LANG = (lang in I18N) ? lang : "en";
  localStorage.setItem("pb_lang", LANG);
  document.documentElement.lang = LANG;
  applyI18n();
}

function applyI18n() {
  document.querySelectorAll("[data-i18n]").forEach((el) => {
    el.textContent = t(el.getAttribute("data-i18n"));
  });
  document.querySelectorAll("[data-i18n-html]").forEach((el) => {
    el.innerHTML = t(el.getAttribute("data-i18n-html"));
  });
  document.querySelectorAll("[data-i18n-ph]").forEach((el) => {
    el.setAttribute("placeholder", t(el.getAttribute("data-i18n-ph")));
  });
  document.querySelectorAll("[data-i18n-title]").forEach((el) => {
    el.setAttribute("title", t(el.getAttribute("data-i18n-title")));
  });
  if (typeof onLangChange === "function") onLangChange();
}

<script>
// Front-end controller for the primerblast-oss GUI.
// Vanilla JS, no build step. Talks to the stdlib http.server backend.

"use strict";

const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g,
  (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

let selectedDbs = [];           // chosen database prefixes
let customDbs = [];             // user-typed prefixes
let lastResult = null;          // for re-render on language switch

// Beginner vs Pro. Pro strips the intros / examples / legends / plain
// verdicts (via CSS on :root[data-ui]) and expands every advanced group.
// Set the attribute immediately so pro users don't flash the beginner UI.
let UI = localStorage.getItem("pb_ui") || "beginner";
document.documentElement.setAttribute("data-ui", UI);
function syncUI() {
  document.documentElement.setAttribute("data-ui", UI);
  $$("#mode-switch .ms-btn").forEach((b) => b.classList.toggle("on", b.dataset.uiSet === UI));
  $$("details.adv").forEach((d) => { d.open = (UI === "pro"); });
}
function setUI(mode) {
  UI = (mode === "pro") ? "pro" : "beginner";
  localStorage.setItem("pb_ui", UI);
  syncUI();
}

// --------------------------------------------------------------------------
// example data (so a first-timer can press Run immediately)
// --------------------------------------------------------------------------
// A small synthetic ~480 bp template with unique flanks — enough for Primer3 to
// return pairs and for tiling to place a couple of tiles.
const DEMO_SEQ =
  "ATGGCTAGCACCGGTTCAGACGTGAAGCTTGCCTGACTTCAGGATCCACGTGACCTGAGT" +
  "CAGTGGCCATTGACGTCAATGGGAGTTTGTTTTGGCACCAAAATCAACGGGACTTTCCAA" +
  "AATGTCGTAACAACTCCGCCCCATTGACGCAAATGGGCGGTAGGCGTGTACGGTGGGAGG" +
  "TCTATATAAGCAGAGCTCTCTGGCTAACTAGAGAACCCACTGCTTACTGGCTTATCGAAA" +
  "TTAATACGACTCACTATAGGGAGACCCAAGCTGGCTAGCGTTTAAACTTAAGCTTGGTAC" +
  "CGAGCTCGGATCCACTAGTAACGGCCGCCAGTGTGCTGGAATTCTGCAGATATCCATCAC" +
  "ACTGGCGGCCGCTCGAGCATGCATCTAGAGGGCCCAATTCGCCCTATAGTGAGTCGTATT" +
  "ACAATTCACTGGCCGTCGTTTTACAACGTCGTGACTGGGAAAACCCTGGCGTTACCCAAC";
const EXAMPLES = {
  design: (f) => { setVal(f, "source", "sequence"); setVal(f, "template", DEMO_SEQ);
    setVal(f, "template_id", "demo"); setVal(f, "product_size", "120-300"); setVal(f, "num_return", "5"); },
  check: (f) => { setVal(f, "forward", "ATGGCTAGCACCGGTTCAGA"); setVal(f, "reverse", "GTTGGGTAACGCCAGGGTTT"); },
  tile: (f) => { setVal(f, "template", DEMO_SEQ); setVal(f, "template_id", "demo");
    setVal(f, "amplicon_min", "150"); setVal(f, "amplicon_max", "300"); setVal(f, "overlap", "30"); },
};
function setVal(form, name, value) {
  const el = $(`[name="${name}"]`, form);
  if (!el) return;
  el.value = value;
  el.dispatchEvent(new Event("change", { bubbles: true }));
}

// --------------------------------------------------------------------------
// shared advanced field groups (injected into every relevant form)
// --------------------------------------------------------------------------
function knobsHTML() {
  const f = (n, v, step) =>
    `<label><span data-i18n="f.${n}"></span><input name="${n}" type="number" step="${step || 1}" value="${v}"></label>`;
  return `<details class="adv"><summary data-i18n="grp.primer3"></summary><div class="grid">
    ${f("opt_size", 20)}${f("min_size", 18)}${f("max_size", 25)}
    ${f("opt_tm", 60, "any")}${f("min_tm", 57, "any")}${f("max_tm", 63, "any")}
    ${f("min_gc", 20, "any")}${f("max_gc", 80, "any")}
    <label><span data-i18n="f.size_tolerance"></span><input name="size_tolerance" type="number" value="10"></label>
  </div></details>`;
}
function specHTML() {
  const f = (n, v, step) =>
    `<label><span data-i18n="f.${n}"></span><input name="${n}" type="number" step="${step || 1}" value="${v}"></label>`;
  return `<details class="adv"><summary data-i18n="grp.spec"></summary><div class="grid">
    ${f("max_total_mismatch", 4)}${f("max_3prime_mismatch", 1)}${f("three_prime_window", 5)}
    ${f("min_product", 40)}${f("max_product", 4000)}${f("gel_min_gap", 50)}${f("word_size", 7)}
    <label class="check"><input name="no_3prime_terminal" type="checkbox"><span data-i18n="f.no_3prime_terminal"></span></label>
  </div></details>`;
}
function injectGroups() {
  $$("[data-knobs]").forEach((d) => { d.innerHTML = knobsHTML(); });
  $$("[data-spec]").forEach((d) => { d.innerHTML = specHTML(); });
}

// --------------------------------------------------------------------------
// databases
// --------------------------------------------------------------------------
async function loadDatabases() {
  let discovered = [];
  try {
    const r = await fetch("/api/databases");
    discovered = (await r.json()).databases || [];
  } catch (e) { /* offline: keep custom only */ }
  const all = [...discovered.map((d) => ({ name: d.name, path: d.path })),
               ...customDbs.map((p) => ({ name: p.split("/").pop(), path: p }))];
  const seen = new Set();
  const list = $("#db-list");
  list.innerHTML = "";
  list.setAttribute("data-empty", t("db.none"));
  all.forEach((d) => {
    if (seen.has(d.path)) return;
    seen.add(d.path);
    const chip = document.createElement("span");
    chip.className = "db-chip" + (selectedDbs.includes(d.path) ? " on" : "");
    chip.innerHTML = `<span class="tick">${selectedDbs.includes(d.path) ? "✓" : "＋"}</span><span class="db-name">${esc(d.name)}</span>`;
    chip.title = d.path;
    chip.addEventListener("click", () => {
      if (selectedDbs.includes(d.path)) selectedDbs = selectedDbs.filter((x) => x !== d.path);
      else selectedDbs.push(d.path);
      chip.classList.toggle("on");
      chip.querySelector(".tick").textContent = chip.classList.contains("on") ? "✓" : "＋";
      updateDbCount();
    });
    list.appendChild(chip);
  });
  updateDbCount();
}
function updateDbCount() {
  const el = $("#db-count");
  if (selectedDbs.length === 0) {
    el.textContent = t("db.pick");
    el.classList.add("warn");
  } else {
    el.textContent = `${selectedDbs.length} ${t("db.selected")}`;
    el.classList.remove("warn");
  }
}

// --------------------------------------------------------------------------
// health
// --------------------------------------------------------------------------
async function loadHealth() {
  const badge = $("#tool-status");
  try {
    const h = await (await fetch("/api/health")).json();
    if (h.ok) {
      badge.className = "status status-ok";
      badge.textContent = t("status.ok");
    } else {
      const missing = Object.entries(h.tools).filter(([, v]) => !v).map(([k]) => k);
      badge.className = "status status-bad";
      badge.textContent = `${t("status.missing")} ${missing.join(", ")}`;
    }
  } catch (e) {
    badge.className = "status status-bad";
    badge.textContent = "backend offline";
  }
}

// --------------------------------------------------------------------------
// tabs
// --------------------------------------------------------------------------
function showTab(name) {
  $$(".tab").forEach((b) => b.classList.toggle("active", b.dataset.tab === name));
  $$(".panel").forEach((p) => p.classList.toggle("active", p.dataset.panel === name));
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function initTabs() {
  $$(".tab").forEach((btn) => btn.addEventListener("click", () => showTab(btn.dataset.tab)));
  // guide "mode cards" and CTA buttons jump to a tab
  $$("[data-goto]").forEach((el) => el.addEventListener("click", () => showTab(el.dataset.goto)));
}

// --------------------------------------------------------------------------
// assay: show only fields for the selected target kind
// --------------------------------------------------------------------------
function initAssayKind() {
  const sel = $("#assay-kind");
  if (!sel) return;
  const sync = () => {
    const kind = sel.value;
    $$('[data-kind]', sel.closest("form")).forEach((el) => {
      el.style.display = (el.dataset.kind === kind) ? "" : "none";
    });
  };
  sel.addEventListener("change", sync);
  sync();
}

// design tab: switch template source between pasted sequence and gene name
function initDesignSrc() {
  const sel = $("#design-src");
  if (!sel) return;
  const sync = () => {
    const src = sel.value;
    $$('[data-src]', sel.closest("form")).forEach((el) => {
      el.style.display = (el.dataset.src === src) ? "" : "none";
    });
  };
  sel.addEventListener("change", sync);
  sync();
}

// --------------------------------------------------------------------------
// form submit -> job -> poll -> render
// --------------------------------------------------------------------------
function formParams(form) {
  const p = {};
  $$("input,textarea,select", form).forEach((el) => {
    if (!el.name) return;
    if (el.type === "checkbox") p[el.name] = el.checked;
    else p[el.name] = el.value;
  });
  return p;
}

function buildParams(mode, form) {
  const p = formParams(form);
  if (mode !== "makedb") p.db = selectedDbs.slice();
  if (mode === "check") {
    p.primers = (p.primers || "").split(/\r?\n/).map((s) => s.trim()).filter(Boolean);
  }
  if (mode === "assay") {
    const kind = p.target_kind;
    if (kind !== "gene") { p.gene = ""; p.gff3 = ""; }
    if (kind !== "interval") { p.interval = ""; }
    if (kind !== "snp") { p.snp = ""; p.alt = ""; }
  }
  return p;
}

async function runMode(mode, form) {
  const btn = $(".run", form);
  const results = $("#results");
  if (mode !== "makedb" && selectedDbs.length === 0) {
    results.innerHTML = `<div class="err">${esc(t("db.pick"))}</div>`;
    results.scrollIntoView({ behavior: "smooth", block: "nearest" });
    return;
  }
  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = t("btn.running");
  results.innerHTML = `<p class="results-empty"><span class="spinner"></span>${esc(t("res.running"))}</p>`;

  try {
    const submit = await (await fetch(`/api/run/${mode}`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ params: buildParams(mode, form) }),
    })).json();
    if (submit.error) throw new Error(submit.error);
    const job = await pollJob(submit.job_id);
    if (job.status === "error") {
      results.innerHTML = `<div class="err">${esc(t("res.error"))}: ${esc(job.error)}\n\n${esc(job.trace || "")}</div>`;
    } else {
      lastResult = job.result;
      renderResult(job.result);
    }
  } catch (e) {
    results.innerHTML = `<div class="err">${esc(t("res.error"))}: ${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = original;
  }
}

function pollJob(jobId) {
  return new Promise((resolve, reject) => {
    const tick = async () => {
      try {
        const j = await (await fetch(`/api/job/${jobId}`)).json();
        if (j.status === "running") setTimeout(tick, 1200);
        else resolve(j);
      } catch (e) { reject(e); }
    };
    tick();
  });
}

// --------------------------------------------------------------------------
// rendering
// --------------------------------------------------------------------------
function renderResult(data) {
  const renderers = {
    design: renderDesign, check: renderCheck, tile: renderTile,
    assay: renderAssay, markers: renderMarkers, makedb: renderMakedb,
  };
  const fn = renderers[data.mode];
  $("#results").innerHTML = fn ? fn(data) : `<pre class="explain">${esc(JSON.stringify(data, null, 2))}</pre>`;
  wireDownloads();
}

function dbNames(dbs) { return (dbs || []).map((d) => String(d).split("/").pop()).join(", "); }

function verdictBadge(spec) {
  const tip = ` title="${esc(t("tip.verdict"))}"`;
  if (spec.specific_all_db) return `<span class="badge v-specific"${tip}>${t("verdict.specific")}</span>`;
  if (spec.gel_distinguishable) return `<span class="badge v-gel"${tip}>${t("verdict.gel")}</span>`;
  return `<span class="badge v-ambiguous"${tip}>${t("verdict.ambiguous")}</span>`;
}
function riskBadge(level) {
  const key = { low: "risk.low", medium: "risk.med", high: "risk.high" }[level] || "risk.med";
  const cls = { low: "risk-low", medium: "risk-med", high: "risk-high" }[level] || "risk-med";
  return `<span class="badge ${cls}">${t(key)}</span>`;
}

function plainVerdict(spec) {
  if (spec.specific_all_db) return { cls: "pv-ok", text: t("pv.specific") };
  if (spec.gel_distinguishable) return { cls: "pv-warn", text: t("pv.gel") };
  return { cls: "pv-bad", text: t("pv.ambiguous") };
}

function legendHTML(kind) {
  const rows = [];
  if (kind === "design" || kind === "tile") { rows.push("leg.rank", "leg.onoff", "leg.score"); }
  else if (kind === "check") { rows.push("leg.onoff"); }
  else if (kind === "assay") { rows.push("leg.risk", "leg.onoff"); }
  return `<details class="legend"><summary>${esc(t("leg.title"))}</summary>` +
    rows.map((k) => `<p>${esc(t(k))}</p>`).join("") + `</details>`;
}

function offtargetTable(perDb) {
  let rows = "";
  perDb.forEach((db) => {
    (db.off_target || []).forEach((a) => {
      rows += `<tr><td>${esc(db.db.split("/").pop())}</td><td class="seqmono">${esc(a.subject)}:${a.start}-${a.end}</td>
        <td>${a.size}</td><td class="seqmono">${esc(a.orientation)}</td><td>${a.fwd_mismatch}+${a.rev_mismatch}</td></tr>`;
    });
  });
  if (!rows) return "";
  return `<div class="tbl-wrap"><table><thead><tr>
    <th>${t("res.databases")}</th><th>${t("res.subject")}</th><th>${t("res.size")}</th>
    <th>${t("res.orientation")}</th><th>${t("res.mismatch")}</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderDesign(data) {
  let html = legendHTML("design");
  data.templates.forEach((tpl) => {
    html += `<div class="result-head"><h3>${t("res.template")}: ${esc(tpl.template_id)}</h3>
      <span class="meta">${tpl.template_len} bp · ${t("res.databases")}: ${esc(dbNames(tpl.databases))} · ${tpl.n_pairs} ${t("res.pairs")}</span></div>`;
    html += `<div class="downloads"><strong>${t("dl.title")}</strong>
      ${dl("tsv", `${tpl.template_id}.tsv`, tpl.tsv)}
      ${dl("json", `${tpl.template_id}.json`, JSON.stringify(tpl, null, 2))}</div>`;
    if (!tpl.pairs.length) { html += `<p class="results-empty">${t("res.none")}</p>`; return; }
    tpl.pairs.forEach((p, i) => {
      const s = p.specificity || {};
      const fPos = `${p.left_start + 1}..${p.left_start + p.left_len}`;
      const rPos = `${p.right_start - p.right_len + 2}..${p.right_start + 1}`;
      const pv = plainVerdict(s);
      html += `<details class="pair-card"${i === 0 ? " open" : ""}><summary>
        <div class="pair-summary">
          <span class="badge rank-${esc(s.rank)}" title="${esc(t("tip.rank"))}">${esc(s.rank)}</span>
          ${verdictBadge(s)}
          <div class="grow"><span class="seqmono">F 5′-${esc(p.forward)}-3′ / R 5′-${esc(p.reverse)}-3′</span>
            <div class="subline">${t("res.product")} ${p.product_size} bp · Tm ${p.tm_f.toFixed(1)}/${p.tm_r.toFixed(1)} ·
              GC ${p.gc_f.toFixed(0)}/${p.gc_r.toFixed(0)}% · ${t("res.pos")} F ${fPos} R ${rPos}</div></div>
          <span class="meta"><span title="${esc(t("tip.score"))}">${t("res.score")} ${s.score}</span> ·
            <span title="${esc(t("tip.ontarget"))}">${t("res.ontarget")} ${s.total_on_target}</span> ·
            <span title="${esc(t("tip.offtarget"))}">${t("res.offtarget")} ${s.total_off_target}</span>
            <span title="${esc(t("tip.comigrating"))}">(${t("res.comigrating")} ${s.total_comigrating})</span></span>
        </div>
        <p class="verdict-plain ${pv.cls}">${esc(pv.text)}</p></summary>
        ${offtargetTable(s.per_db || [])}</details>`;
    });
    if (tpl.primer3_explain) {
      html += `<details class="adv"><summary>${t("res.explain")}</summary><pre class="explain">${esc(tpl.primer3_explain)}</pre></details>`;
    }
  });
  return html;
}

function renderCheck(data) {
  let html = legendHTML("check") + `<div class="result-head"><h3>${t("tab.check")}</h3>
    <span class="meta">${Object.entries(data.primers).map(([k, v]) => `${esc(k)}=${esc(v)}`).join(" · ")}</span></div>`;
  html += `<div class="downloads"><strong>${t("dl.title")}</strong>${dl("json", "insilico.json", JSON.stringify(data, null, 2))}</div>`;
  (data.results || []).forEach((db) => {
    html += `<div class="result-head"><h3>${esc(db.db.split("/").pop())}</h3>
      <span class="meta">${db.n_products} ${t("res.products")} · ${t("res.sites")}: ${esc(JSON.stringify(db.sites_per_primer))}</span></div>`;
    if (!db.products.length) { html += `<p class="results-empty">${t("res.none")}</p>`; return; }
    let rows = "";
    db.products.forEach((a) => {
      rows += `<tr><td class="seqmono">${esc(a.subject)}:${a.start}-${a.end}</td><td>${a.size}</td>
        <td class="seqmono">${esc(a.orientation)}</td><td>${a.fwd_mismatch}+${a.rev_mismatch}</td>
        <td>${a.on_target ? "✓" : ""}</td></tr>`;
    });
    html += `<div class="tbl-wrap"><table><thead><tr><th>${t("res.subject")}</th><th>${t("res.size")}</th>
      <th>${t("res.orientation")}</th><th>${t("res.mismatch")}</th><th>${t("res.ontarget")}</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  });
  return html;
}

function renderTile(data) {
  let html = legendHTML("tile");
  data.templates.forEach((tpl) => {
    html += `<div class="result-head"><h3>${t("res.template")}: ${esc(tpl.template_id)}</h3>
      <span class="meta">${t("res.tiles")}: ${tpl.n_tiles} · ${t("res.databases")}: ${esc(dbNames(tpl.databases))}</span></div>`;
    html += `<div class="downloads"><strong>${t("dl.title")}</strong>${dl("json", `${tpl.template_id}_tiles.json`, JSON.stringify(tpl, null, 2))}</div>`;
    if (!tpl.tiles.length) { html += `<p class="results-empty">${t("res.none")}</p>`; return; }
    let rows = "";
    tpl.tiles.forEach((tl) => {
      const s = tl.specificity || {};
      rows += `<tr><td>${tl.index + 1}</td><td>${tl.covers[0]}–${tl.covers[1]}</td><td>${tl.product_size}</td>
        <td class="seqmono">${esc(tl.forward)}</td><td class="seqmono">${esc(tl.reverse)}</td>
        <td>${tl.tm_f}/${tl.tm_r}</td><td><span class="badge small rank-${esc(s.rank)}">${esc(s.rank || "?")}</span></td></tr>`;
    });
    html += `<div class="tbl-wrap"><table><thead><tr><th>#</th><th>${t("res.covered")}</th><th>${t("res.product")}</th>
      <th>${t("res.forward")}</th><th>${t("res.reverse")}</th><th>${t("res.tm")}</th><th>${t("res.rank")}</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  });
  return html;
}

function renderAssay(data) {
  const tg = data.target || {};
  let html = legendHTML("assay") + `<div class="result-head"><h3>${esc(tg.name || "assay")}</h3>
    <span class="meta">${esc(tg.chrom)}:${tg.start}-${tg.end} · ${data.template_len} bp ·
      ${t("res.databases")}: ${esc(dbNames(data.databases))} · ${data.n_pairs} ${t("res.pairs")}</span></div>`;
  const ex = data.exports || {};
  html += `<div class="downloads"><strong>${t("dl.title")}</strong>
    ${ex.csv ? dl("csv", `${tg.name || "assay"}.csv`, ex.csv) : ""}
    ${ex.order ? dl("order", `${tg.name || "assay"}_order.txt`, ex.order) : ""}
    ${ex.bed ? dl("bed", `${tg.name || "assay"}.bed`, ex.bed) : ""}
    ${ex.ascii ? dl("ascii", `${tg.name || "assay"}_map.txt`, ex.ascii) : ""}
    ${dl("json", `${tg.name || "assay"}.json`, JSON.stringify(data, null, 2))}</div>`;
  if (!(data.pairs || []).length) return html + `<p class="results-empty">${t("res.none")}</p>`;
  data.pairs.forEach((p, i) => {
    html += `<details class="pair-card"${i === 0 ? " open" : ""}><summary>
      <div class="pair-summary">${riskBadge(p.risk)}
        <div class="grow"><span class="seqmono">F 5′-${esc(p.forward)}-3′ / R 5′-${esc(p.reverse)}-3′</span>
          <div class="subline">${t("res.product")} ${p.product_size} bp · Tm ${p.tm_f}/${p.tm_r} · GC ${p.gc_f}/${p.gc_r}%</div></div>
        <span class="meta">${t("res.offtarget")} ${p.n_off_target} (FR ${p.n_fr_offtarget}/FF ${p.n_ff}/RR ${p.n_rr})
          ${p.caps_enzyme ? " · " + t("res.caps") + ": " + esc(p.caps_enzyme) : ""}
          ${p.snp_in_primer ? " · " + t("res.snp") : ""}</span>
      </div></summary>
      <p class="subline">${esc((p.risk_reasons || []).join("; "))}</p>
      ${p.products && p.products.length ? productsMini(p.products) : ""}</details>`;
  });
  if (ex.ascii) html += `<details class="adv"><summary>${t("dl.ascii")}</summary><pre class="ascii">${esc(ex.ascii)}</pre></details>`;
  return html;
}

function productsMini(products) {
  let rows = "";
  products.forEach((a) => {
    rows += `<tr><td class="seqmono">${esc(a.subject)}:${a.start}-${a.end}</td><td>${a.size}</td>
      <td class="seqmono">${esc(a.orientation)}</td><td>${a.fwd_mismatch}+${a.rev_mismatch}</td>
      <td>${a.on_target ? "✓" : ""}</td></tr>`;
  });
  return `<div class="tbl-wrap"><table><thead><tr><th>${t("res.subject")}</th><th>${t("res.size")}</th>
    <th>${t("res.orientation")}</th><th>${t("res.mismatch")}</th><th>${t("res.ontarget")}</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderMarkers(data) {
  let html = `<div class="result-head"><h3>${t("tab.markers")}</h3><span class="meta">${esc(data.interval || "")} · ${(data.markers || []).length}</span></div>`;
  html += `<div class="downloads"><strong>${t("dl.title")}</strong>${dl("json", "markers.json", JSON.stringify(data, null, 2))}</div>`;
  let rows = "";
  (data.markers || []).forEach((m) => {
    const p = (m.pairs || [])[0];
    if (p) {
      rows += `<tr><td>${esc(m.marker)}</td><td>${esc(m.anchor)}</td><td>${riskBadge(p.risk)}</td>
        <td>${p.product_size}</td><td class="seqmono">${esc(p.forward)}</td><td class="seqmono">${esc(p.reverse)}</td></tr>`;
    } else {
      rows += `<tr><td>${esc(m.marker)}</td><td>${esc(m.anchor)}</td><td colspan="4" class="subline">${esc(m.error || t("res.nopair"))}</td></tr>`;
    }
  });
  html += `<div class="tbl-wrap"><table><thead><tr><th>${t("res.marker")}</th><th>${t("res.anchor")}</th>
    <th>${t("res.risk")}</th><th>${t("res.product")}</th><th>${t("res.forward")}</th><th>${t("res.reverse")}</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
  return html;
}

function renderMakedb(data) {
  return `<div class="result-head"><h3>${t("tab.makedb")}</h3></div>
    <pre class="explain">${esc(data.message || JSON.stringify(data, null, 2))}</pre>`;
}

// --------------------------------------------------------------------------
// downloads (client-side blobs)
// --------------------------------------------------------------------------
let _dlStore = [];
function dl(kind, filename, text) {
  if (text == null) return "";
  const id = _dlStore.length;
  _dlStore.push({ filename, text });
  return `<button class="dlbtn" data-dl="${id}">${t("dl." + kind)}</button>`;
}
function wireDownloads() {
  $$(".dlbtn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const { filename, text } = _dlStore[+btn.dataset.dl];
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 4000);
    });
  });
}

// --------------------------------------------------------------------------
// language change hook (called by applyI18n)
// --------------------------------------------------------------------------
function onLangChange() {
  updateDbCount();
  loadHealth();
  $("#db-list").setAttribute("data-empty", t("db.none"));
  if (lastResult) renderResult(lastResult);
}

// --------------------------------------------------------------------------
// boot
// --------------------------------------------------------------------------
function boot() {
  injectGroups();
  applyI18n();
  initTabs();
  initAssayKind();
  initDesignSrc();
  loadHealth();
  loadDatabases();

  $("#lang-btn").addEventListener("click", () => setLang(LANG === "ja" ? "en" : "ja"));
  $$("#mode-switch .ms-btn").forEach((b) =>
    b.addEventListener("click", () => setUI(b.dataset.uiSet)));
  syncUI();
  // First-time landing: beginners start on the guide, pros go straight to work.
  showTab(UI === "pro" ? "design" : "guide");
  $("#db-refresh").addEventListener("click", loadDatabases);
  $("#db-add").addEventListener("click", () => {
    const input = $("#db-custom-input");
    const v = input.value.trim();
    if (v && !customDbs.includes(v)) {
      customDbs.push(v);
      if (!selectedDbs.includes(v)) selectedDbs.push(v);
      input.value = "";
      loadDatabases();
    }
  });
  $$("[data-example]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const form = btn.closest("form");
      const fill = EXAMPLES[btn.dataset.example];
      if (fill) fill(form);
    });
  });
  $$(".panel[data-mode]").forEach((form) => {
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      runMode(form.dataset.mode, form);
    });
    form.addEventListener("reset", () => setTimeout(() => {
      injectGroups(); applyI18n(); syncUI();
      const ds = $("#design-src"); if (ds) ds.dispatchEvent(new Event("change"));
      const ak = $("#assay-kind"); if (ak) ak.dispatchEvent(new Event("change"));
    }, 0));
  });
}

document.addEventListener("DOMContentLoaded", boot);
</script>
